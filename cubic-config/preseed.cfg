# Dingo OS Preseed Configuration for Cubic
# This file automates Ubuntu installation setup

# Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network configuration (DHCP)
d-i netcfg/enable boolean true
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string dingo-os
d-i netcfg/get_domain string local

# Clock and time
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Partitioning
d-i partman-auto/method string lvm
d-i partman-auto/disk string /dev/sda
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true

# Root password
d-i passwd/root-login boolean true
d-i passwd/root-password password root
d-i passwd/root-password-again password root

# User account
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Dingo User
d-i passwd/username string dingo
d-i passwd/user-password password dingo
d-i passwd/user-password-again password dingo
d-i user-setup/allow-password-weak boolean true

# Package selection
tasksel tasksel/first multiselect standard

# Software to install
d-i pkgsel/include string build-essential g++ make git python3 python3-pip curl wget vim

# Update package lists
d-i pkgsel/update-policy select none

# GRUB bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

# Finish installation
d-i finish-install/reboot_in_background boolean true
